<style>
  body { font-family: 'JetBrains Mono', 'Fira Mono', monospace; }

  .demo-wrap { display: flex; gap: 40px; align-items: flex-start; flex-wrap: wrap; }

  .sidebar-mock {
    background: #1a1a1f; border: 1px solid #2a2a32; border-radius: 10px;
    padding: 16px; width: 250px; font-family: inherit; flex-shrink: 0;
  }
  .mock-section { margin-bottom: 14px; }
  .mock-label {
    font-size: 9px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 1.5px; color: #56565f; margin-bottom: 7px;
  }
  .section-rule { height: 1px; background: #2a2a32; margin: 12px 0; }

  /* ── numeric pill ── */
  .pill {
    background: #222228; border: 1px solid #2a2a32; border-radius: 5px;
    display: flex; align-items: stretch; overflow: hidden;
    transition: border-color 200ms; user-select: none;
  }
  .pill:hover { border-color: #3a3a45; }

  .pill-start {
    padding: 7px 11px; display: flex; flex-direction: column;
    gap: 2px; flex: 1; min-width: 0;
  }
  .pill-tag { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: #45454e; }
  .pill-val {
    font-size: 13px; color: #ccc; cursor: ew-resize; transition: color 120ms;
    white-space: nowrap;
  }
  .pill-val:hover { color: #D4A853; }

  .pill-end-wrap {
    display: flex; align-items: stretch; overflow: hidden;
    transition: max-width 360ms cubic-bezier(0.4,0,0.2,1), opacity 240ms ease;
    max-width: 0; opacity: 0;
  }
  .pill[data-range="true"] .pill-end-wrap { max-width: 160px; opacity: 1; }

  .pill-end {
    border-left: 1px solid #2a2a32; padding: 7px 11px;
    display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0;
  }
  .pill-end-inner { display: flex; align-items: center; gap: 6px; }
  .pill-end-arrow {
    color: #D4A853; font-size: 12px; flex-shrink: 0;
    opacity: 0; transition: opacity 200ms 100ms;
  }
  .pill[data-range="true"] .pill-end-arrow { opacity: 1; }

  .pill-toggle {
    display: flex; align-items: center; padding: 0 10px;
    border-left: 1px solid #2a2a32; color: #45454e; font-size: 14px;
    cursor: pointer; background: none;
    border-top: none; border-right: none; border-bottom: none;
    font-family: inherit; flex-shrink: 0; line-height: 1;
    transition: color 200ms, background 200ms;
  }
  .pill-toggle:hover { color: #D4A853; background: rgba(212,168,83,0.05); }
  .pill[data-range="true"] .pill-toggle { color: #D4A853; }

  /* ── color pill ── */
  .cpill {
    background: #222228; border: 1px solid #2a2a32; border-radius: 5px;
    display: flex; align-items: stretch; overflow: hidden;
    transition: border-color 200ms; user-select: none;
  }
  .cpill:hover { border-color: #3a3a45; }

  .cpill-start, .cpill-end-inner {
    padding: 7px 10px; display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0;
  }
  .cpill-end-inner { gap: 6px; }

  /* swatch — transitions from rect to square */
  .swatch-btn {
    position: relative; flex-shrink: 0;
    border-radius: 3px; border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer; overflow: hidden;
    width: 22px; height: 16px;
    transition: width 300ms cubic-bezier(0.4,0,0.2,1),
                height 300ms cubic-bezier(0.4,0,0.2,1),
                border-radius 300ms;
  }
  .cpill[data-range="true"] .swatch-btn {
    width: 14px; height: 14px; border-radius: 2px;
  }
  .swatch-btn input[type="color"] {
    position: absolute; inset: 0; width: 100%; height: 100%;
    opacity: 0; cursor: pointer; padding: 0; border: none;
  }

  .cpill-text { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .cpill-hex {
    font-size: 10px; color: #ccc; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
    transition: font-size 200ms;
  }
  .cpill[data-range="true"] .cpill-hex { font-size: 10px; }

  .cpill-end-wrap {
    display: flex; align-items: stretch; overflow: hidden;
    transition: max-width 360ms cubic-bezier(0.4,0,0.2,1), opacity 240ms ease;
    max-width: 0; opacity: 0;
  }
  .cpill[data-range="true"] .cpill-end-wrap { max-width: 160px; opacity: 1; }

  .cpill-end {
    border-left: 1px solid #2a2a32;
    display: flex; align-items: stretch; flex: 1; min-width: 0;
  }
  .cpill-end-arrow {
    color: #D4A853; font-size: 11px; flex-shrink: 0;
    opacity: 0; transition: opacity 200ms 100ms;
  }
  .cpill[data-range="true"] .cpill-end-arrow { opacity: 1; }

  .cpill-toggle {
    display: flex; align-items: center; padding: 0 10px;
    border-left: 1px solid #2a2a32; color: #45454e; font-size: 14px;
    cursor: pointer; background: none;
    border-top: none; border-right: none; border-bottom: none;
    font-family: inherit; flex-shrink: 0; line-height: 1;
    transition: color 200ms, background 200ms;
  }
  .cpill-toggle:hover { color: #D4A853; background: rgba(212,168,83,0.05); }
  .cpill[data-range="true"] .cpill-toggle { color: #D4A853; }

  .scrub-hint {
    font-size: 8px; text-transform: uppercase; letter-spacing: 1px;
    color: #3a3a45; margin-top: 14px; text-align: center;
  }
</style>

<h2>Option B — v3</h2>
<p class="subtitle">Click a swatch to open picker · Swatches shrink to square in range mode · Both hex codes visible</p>

<div class="demo-wrap">
  <div class="sidebar-mock">

    <!-- Spacing -->
    <div class="mock-section">
      <div class="mock-label">Spacing</div>
      <div class="pill" data-range="false" id="pill-spacing">
        <div class="pill-start">
          <span class="pill-tag">Start</span>
          <span class="pill-val" data-min="5" data-max="200" data-step="1">40</span>
        </div>
        <div class="pill-end-wrap">
          <div class="pill-end">
            <span class="pill-tag">End</span>
            <div class="pill-end-inner">
              <span class="pill-end-arrow">→</span>
              <span class="pill-val" data-min="5" data-max="200" data-step="1">100</span>
            </div>
          </div>
        </div>
        <button class="pill-toggle" onclick="toggle('pill-spacing')">↔</button>
      </div>
    </div>

    <!-- Scale -->
    <div class="mock-section">
      <div class="mock-label">Scale</div>
      <div class="pill" data-range="false" id="pill-scale">
        <div class="pill-start">
          <span class="pill-tag">Start</span>
          <span class="pill-val" data-min="0.1" data-max="5" data-step="0.1">1.0</span>
        </div>
        <div class="pill-end-wrap">
          <div class="pill-end">
            <span class="pill-tag">End</span>
            <div class="pill-end-inner">
              <span class="pill-end-arrow">→</span>
              <span class="pill-val" data-min="0.1" data-max="5" data-step="0.1">3.0</span>
            </div>
          </div>
        </div>
        <button class="pill-toggle" onclick="toggle('pill-scale')">↔</button>
      </div>
    </div>

    <div class="section-rule"></div>

    <!-- Fill Color -->
    <div class="mock-section">
      <div class="mock-label">Fill Color</div>
      <div class="cpill" data-range="false" id="cpill-fill">
        <div class="cpill-start">
          <div class="swatch-btn" style="background:#D4A853" id="sw-fill-start">
            <input type="color" value="#D4A853" oninput="updateSwatch('sw-fill-start','hex-fill-start',this.value)">
          </div>
          <div class="cpill-text">
            <span class="pill-tag">Start</span>
            <span class="cpill-hex" id="hex-fill-start">#D4A853</span>
          </div>
        </div>
        <div class="cpill-end-wrap">
          <div class="cpill-end">
            <div class="cpill-end-inner">
              <span class="cpill-end-arrow">→</span>
              <div class="swatch-btn" style="background:#ff4422" id="sw-fill-end">
                <input type="color" value="#ff4422" oninput="updateSwatch('sw-fill-end','hex-fill-end',this.value)">
              </div>
              <div class="cpill-text">
                <span class="pill-tag">End</span>
                <span class="cpill-hex" id="hex-fill-end">#FF4422</span>
              </div>
            </div>
          </div>
        </div>
        <button class="cpill-toggle" onclick="toggle('cpill-fill')">↔</button>
      </div>
    </div>

    <!-- Stroke Color -->
    <div class="mock-section">
      <div class="mock-label">Stroke Color</div>
      <div class="cpill" data-range="false" id="cpill-stroke">
        <div class="cpill-start">
          <div class="swatch-btn" style="background:#ffffff" id="sw-stroke-start">
            <input type="color" value="#ffffff" oninput="updateSwatch('sw-stroke-start','hex-stroke-start',this.value)">
          </div>
          <div class="cpill-text">
            <span class="pill-tag">Start</span>
            <span class="cpill-hex" id="hex-stroke-start">#FFFFFF</span>
          </div>
        </div>
        <div class="cpill-end-wrap">
          <div class="cpill-end">
            <div class="cpill-end-inner">
              <span class="cpill-end-arrow">→</span>
              <div class="swatch-btn" style="background:#0055ff" id="sw-stroke-end">
                <input type="color" value="#0055ff" oninput="updateSwatch('sw-stroke-end','hex-stroke-end',this.value)">
              </div>
              <div class="cpill-text">
                <span class="pill-tag">End</span>
                <span class="cpill-hex" id="hex-stroke-end">#0055FF</span>
              </div>
            </div>
          </div>
        </div>
        <button class="cpill-toggle" onclick="toggle('cpill-stroke')">↔</button>
      </div>
    </div>

    <div class="scrub-hint">drag numbers to scrub</div>
  </div>
</div>

<script>
function toggle(id) {
  const el = document.getElementById(id);
  el.dataset.range = el.dataset.range === 'true' ? 'false' : 'true';
}

function updateSwatch(swatchId, hexId, val) {
  document.getElementById(swatchId).style.background = val;
  document.getElementById(hexId).textContent = val.toUpperCase();
}

// scrubbing
let drag = null;
document.addEventListener('mousedown', e => {
  const el = e.target.closest('.pill-val');
  if (!el) return;
  e.preventDefault();
  drag = {
    el,
    step:     parseFloat(el.dataset.step ?? 1),
    min:      parseFloat(el.dataset.min  ?? 0),
    max:      parseFloat(el.dataset.max  ?? 200),
    startX:   e.clientX,
    startVal: parseFloat(el.textContent),
  };
  document.body.style.cursor = 'ew-resize';
});
document.addEventListener('mousemove', e => {
  if (!drag) return;
  const raw     = drag.startVal + (e.clientX - drag.startX) / 2 * drag.step;
  const snapped = Math.round(Math.min(drag.max, Math.max(drag.min, raw)) / drag.step) * drag.step;
  drag.el.textContent = drag.step < 1 ? snapped.toFixed(1) : Math.round(snapped);
});
document.addEventListener('mouseup', () => { drag = null; document.body.style.cursor = ''; });
</script>
