<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Color picker preview</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111115;
    color: #ccc;
    font-family: 'JetBrains Mono', 'Fira Mono', monospace;
    padding: 40px;
    min-height: 100vh;
  }
  h2 { font-size: 18px; font-weight: 400; color: #e8e8ec; margin-bottom: 6px; }
  .subtitle { font-size: 11px; color: #56565f; margin-bottom: 28px; line-height: 1.6; }

  .sidebar-mock {
    background: #1a1a1f; border: 1px solid #2a2a32; border-radius: 10px;
    padding: 16px; width: 250px; font-family: inherit;
  }
  .mock-section { margin-bottom: 14px; }
  .mock-label {
    font-size: 9px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 1.5px; color: #56565f; margin-bottom: 7px;
  }
  .section-rule { height: 1px; background: #2a2a32; margin: 12px 0; }

  /* ── numeric pill ── */
  .pill {
    background: #222228; border: 1px solid #2a2a32; border-radius: 5px;
    display: flex; align-items: stretch; overflow: hidden;
    transition: border-color 200ms; user-select: none;
  }
  .pill:hover { border-color: #3a3a45; }
  .pill-start { padding: 7px 11px; display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .pill-tag { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: #45454e; }
  .pill-val { font-size: 13px; color: #ccc; cursor: ew-resize; transition: color 120ms; }
  .pill-val:hover { color: #D4A853; }
  .pill-end-wrap {
    display: flex; align-items: stretch; overflow: hidden;
    transition: max-width 360ms cubic-bezier(0.4,0,0.2,1), opacity 240ms ease;
    max-width: 0; opacity: 0;
  }
  .pill[data-range="true"] .pill-end-wrap { max-width: 160px; opacity: 1; }
  .pill-end { border-left: 1px solid #2a2a32; padding: 7px 11px; display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .pill-end-inner { display: flex; align-items: center; gap: 6px; }
  .pill-end-arrow { color: #D4A853; font-size: 12px; flex-shrink: 0; opacity: 0; transition: opacity 200ms 100ms; }
  .pill[data-range="true"] .pill-end-arrow { opacity: 1; }
  .pill-toggle {
    display: flex; align-items: center; padding: 0 10px;
    border-left: 1px solid #2a2a32; color: #45454e; font-size: 14px;
    cursor: pointer; background: none; border-top: none; border-right: none; border-bottom: none;
    font-family: inherit; flex-shrink: 0; transition: color 200ms, background 200ms;
  }
  .pill-toggle:hover { color: #D4A853; background: rgba(212,168,83,0.05); }
  .pill[data-range="true"] .pill-toggle { color: #D4A853; }

  /* ── color pill ── */
  .cpill {
    background: #222228; border: 1px solid #2a2a32; border-radius: 5px;
    display: flex; align-items: stretch; overflow: hidden;
    transition: border-color 200ms;
    position: relative;
  }
  .cpill:hover { border-color: #3a3a45; }

  .cpill-half {
    padding: 7px 10px; display: flex; align-items: center; gap: 7px; flex: 1; min-width: 0;
    cursor: default;
  }
  .cpill-half + .cpill-half { border-left: 1px solid #2a2a32; }

  .swatch-btn {
    flex-shrink: 0; border-radius: 3px; border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer; transition: width 300ms cubic-bezier(0.4,0,0.2,1),
                                  height 300ms cubic-bezier(0.4,0,0.2,1);
    width: 22px; height: 16px;
  }
  .cpill[data-range="true"] .swatch-btn { width: 13px; height: 13px; border-radius: 2px; }

  .cpill-text { display: flex; flex-direction: column; gap: 1px; min-width: 0; overflow: hidden; }
  .cpill-hex { font-size: 10px; color: #ccc; white-space: nowrap; }

  .cpill-end-wrap {
    display: flex; align-items: stretch; overflow: hidden;
    transition: max-width 360ms cubic-bezier(0.4,0,0.2,1), opacity 240ms ease;
    max-width: 0; opacity: 0;
  }
  .cpill[data-range="true"] .cpill-end-wrap { max-width: 160px; opacity: 1; }

  .cpill-end-arrow {
    color: #D4A853; font-size: 11px; flex-shrink: 0;
    opacity: 0; transition: opacity 200ms 100ms;
  }
  .cpill[data-range="true"] .cpill-end-arrow { opacity: 1; }

  .cpill-toggle {
    display: flex; align-items: center; padding: 0 10px;
    border-left: 1px solid #2a2a32; color: #45454e; font-size: 14px;
    cursor: pointer; background: none; border-top: none; border-right: none; border-bottom: none;
    font-family: inherit; flex-shrink: 0; transition: color 200ms, background 200ms;
  }
  .cpill-toggle:hover { color: #D4A853; background: rgba(212,168,83,0.05); }
  .cpill[data-range="true"] .cpill-toggle { color: #D4A853; }

  /* ── react-colorful popover ── */
  .picker-wrap {
    position: absolute; z-index: 100;
    top: calc(100% + 6px); left: 0;
    background: #1e1e24;
    border: 1px solid #2a2a32;
    border-radius: 8px;
    padding: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: none;
  }
  .picker-wrap.open { display: block; }
  .picker-wrap .react-colorful { width: 200px; }
  .picker-wrap .react-colorful__saturation { border-radius: 4px 4px 0 0; height: 140px; }
  .picker-wrap .react-colorful__hue { border-radius: 4px; height: 10px; margin-top: 8px; }
  .picker-wrap .react-colorful__saturation-pointer,
  .picker-wrap .react-colorful__hue-pointer { width: 14px; height: 14px; }
  .picker-hex-input {
    width: 100%; margin-top: 8px; background: #111115; border: 1px solid #2a2a32;
    border-radius: 4px; padding: 5px 8px; color: #ccc; font-family: inherit;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    outline: none; transition: border-color 150ms;
  }
  .picker-hex-input:focus { border-color: #D4A853; }

  .scrub-hint {
    font-size: 8px; text-transform: uppercase; letter-spacing: 1px;
    color: #3a3a45; margin-top: 14px; text-align: center;
  }
</style>

<!-- react-colorful from CDN -->
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18",
    "react-dom/client": "https://esm.sh/react-dom@18/client",
    "react-colorful": "https://esm.sh/react-colorful@5.6.1"
  }
}
</script>
</head>
<body>

<h2>Option B — v4</h2>
<p class="subtitle">react-colorful popover · swatches shrink in range mode · both hex codes visible</p>

<div class="sidebar-mock" id="root-mock">

  <!-- Spacing -->
  <div class="mock-section">
    <div class="mock-label">Spacing</div>
    <div class="pill" data-range="false" id="pill-spacing">
      <div class="pill-start">
        <span class="pill-tag">Start</span>
        <span class="pill-val" data-min="5" data-max="200" data-step="1">40</span>
      </div>
      <div class="pill-end-wrap">
        <div class="pill-end">
          <span class="pill-tag">End</span>
          <div class="pill-end-inner">
            <span class="pill-end-arrow">→</span>
            <span class="pill-val" data-min="5" data-max="200" data-step="1">100</span>
          </div>
        </div>
      </div>
      <button class="pill-toggle" onclick="togglePill('pill-spacing')">↔</button>
    </div>
  </div>

  <!-- Scale -->
  <div class="mock-section">
    <div class="mock-label">Scale</div>
    <div class="pill" data-range="false" id="pill-scale">
      <div class="pill-start">
        <span class="pill-tag">Start</span>
        <span class="pill-val" data-min="0.1" data-max="5" data-step="0.1">1.0</span>
      </div>
      <div class="pill-end-wrap">
        <div class="pill-end">
          <span class="pill-tag">End</span>
          <div class="pill-end-inner">
            <span class="pill-end-arrow">→</span>
            <span class="pill-val" data-min="0.1" data-max="5" data-step="0.1">3.0</span>
          </div>
        </div>
      </div>
      <button class="pill-toggle" onclick="togglePill('pill-scale')">↔</button>
    </div>
  </div>

  <div class="section-rule"></div>

  <!-- Color pickers mounted by React below -->
  <div id="color-root"></div>

  <div class="scrub-hint">drag numbers to scrub</div>
</div>

<script type="module">
import { createElement as h, useState, useRef, useEffect } from 'react';
import { createRoot } from 'react-dom/client';
import { HexColorPicker } from 'react-colorful';

function ColorPill({ label, defaultStart, defaultEnd }) {
  const [isRange, setIsRange] = useState(false);
  const [startColor, setStartColor] = useState(defaultStart);
  const [endColor, setEndColor]     = useState(defaultEnd);
  const [openPicker, setOpenPicker] = useState(null); // 'start' | 'end' | null
  const pillRef = useRef(null);

  // close picker when clicking outside
  useEffect(() => {
    if (!openPicker) return;
    const handler = (e) => {
      if (pillRef.current && !pillRef.current.contains(e.target)) setOpenPicker(null);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [openPicker]);

  const activeColor = openPicker === 'start' ? startColor : endColor;
  const setActive   = openPicker === 'start' ? setStartColor : setEndColor;

  return h('div', { className: 'mock-section' },
    h('div', { className: 'mock-label' }, label),
    h('div', {
        className: `cpill${isRange ? '' : ''}`,
        'data-range': isRange ? 'true' : 'false',
        ref: pillRef,
        style: { position: 'relative' }
      },

      // start half
      h('div', {
          className: 'cpill-half',
          onClick: () => setOpenPicker(openPicker === 'start' ? null : 'start'),
          style: { cursor: 'pointer' }
        },
        h('div', {
            className: 'swatch-btn',
            style: { background: startColor }
          }),
        h('div', { className: 'cpill-text' },
          h('span', { className: 'pill-tag' }, 'Start'),
          h('span', { className: 'cpill-hex' }, startColor.toUpperCase())
        )
      ),

      // end half (slides in)
      h('div', { className: 'cpill-end-wrap' },
        h('div', {
            className: 'cpill-half',
            onClick: () => setOpenPicker(openPicker === 'end' ? null : 'end'),
            style: { cursor: 'pointer', borderLeft: '1px solid #2a2a32' }
          },
          h('span', { className: 'cpill-end-arrow' }, '→'),
          h('div', {
              className: 'swatch-btn',
              style: { background: endColor }
            }),
          h('div', { className: 'cpill-text' },
            h('span', { className: 'pill-tag' }, 'End'),
            h('span', { className: 'cpill-hex' }, endColor.toUpperCase())
          )
        )
      ),

      // toggle
      h('button', {
          className: 'cpill-toggle',
          onClick: (e) => { e.stopPropagation(); setIsRange(r => !r); setOpenPicker(null); }
        }, '↔'),

      // floating picker
      openPicker && h('div', { className: 'picker-wrap open', onClick: e => e.stopPropagation() },
        h(HexColorPicker, { color: activeColor, onChange: setActive }),
        h('input', {
            className: 'picker-hex-input',
            value: activeColor.toUpperCase(),
            onChange: e => {
              const v = e.target.value.replace(/[^0-9a-fA-F#]/g,'');
              if (/^#[0-9a-fA-F]{6}$/.test(v)) setActive(v);
            }
          })
      )
    )
  );
}

const root = createRoot(document.getElementById('color-root'));
root.render(h('div', null,
  h(ColorPill, { label: 'Fill Color',   defaultStart: '#D4A853', defaultEnd: '#FF4422' }),
  h(ColorPill, { label: 'Stroke Color', defaultStart: '#FFFFFF', defaultEnd: '#0055FF' }),
));

// ── numeric pill toggle ──
window.togglePill = (id) => {
  const el = document.getElementById(id);
  el.dataset.range = el.dataset.range === 'true' ? 'false' : 'true';
};

// ── scrubbing ──
let drag = null;
document.addEventListener('mousedown', e => {
  const el = e.target.closest('.pill-val');
  if (!el) return;
  e.preventDefault();
  drag = { el, step: parseFloat(el.dataset.step ?? 1), min: parseFloat(el.dataset.min ?? 0),
           max: parseFloat(el.dataset.max ?? 200), startX: e.clientX, startVal: parseFloat(el.textContent) };
  document.body.style.cursor = 'ew-resize';
});
document.addEventListener('mousemove', e => {
  if (!drag) return;
  const raw = drag.startVal + (e.clientX - drag.startX) / 2 * drag.step;
  const s   = Math.round(Math.min(drag.max, Math.max(drag.min, raw)) / drag.step) * drag.step;
  drag.el.textContent = drag.step < 1 ? s.toFixed(1) : Math.round(s);
});
document.addEventListener('mouseup', () => { drag = null; document.body.style.cursor = ''; });
</script>
</body>
</html>
